name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: forge test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1

      - name: Run unit & invariant tests
        run: forge test --no-match-contract UniswapV2Test -v

      - name: Run fork tests
        if: ${{ secrets.MAINNET_RPC_URL != '' }}
        run: forge test --match-contract UniswapV2Test --fork-url ${{ secrets.MAINNET_RPC_URL }} -v
