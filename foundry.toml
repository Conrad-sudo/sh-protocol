[profile.default]
auto_detect_solc=true
src = "src"
out = "out"
libs = ["lib"]
optimizer = true
optimizer_runs = 200
viaIR = true
gas_reports = ["*"]
remappings= ["@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/" ,"@account-abstraction/contracts/=lib/account-abstraction/contracts/",'@chainlink/contracts/=lib/chainlink-brownie-contracts/contracts/']




[fuzz]
runs=1000
depth=200
fail_on_revert=true

[invariant]
runs   = 500      # number of invariant sequences to run
depth  = 100      # number of calls per sequence
fail_on_revert = false   # handler uses try/catch for expected reverts

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
